# tmux config — loads the split fragments in order.
# (Edit the fragments under ~/.tmux/oo/; _post must stay last — it runs tpm.)
source-file ~/.tmux/oo/status.tmux
source-file ~/.tmux/oo/binding.tmux
source-file ~/.tmux/oo/misc.tmux
source-file ~/.tmux/oo/plugins.tmux
source-file ~/.tmux/oo/_post.tmux
